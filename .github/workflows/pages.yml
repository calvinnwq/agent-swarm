name: Deploy docs site

on:
  push:
    branches:
      - main
    paths:
      - docs/site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

# Least-privilege token plus the OIDC + pages scopes the deploy step needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; never cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish docs/site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # The site renders without a build step, so upload docs/site/ as-is.
      - name: Upload docs site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
